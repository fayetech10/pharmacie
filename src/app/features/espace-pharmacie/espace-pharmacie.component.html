<div class="fade-in">
  <!-- Sélecteur d'onglet personnalisé (Segment Control comme dans la photo) -->
  <div class="custom-tabs-nav">
    <button type="button" class="tab-nav-btn" [class.active]="selectedTab === 0" (click)="onTabChange(0)">
      Facturation
    </button>
    <button type="button" class="tab-nav-btn" [class.active]="selectedTab === 1" (click)="onTabChange(1)">
      Mes factures
      <span class="tab-badge" [class.danger]="rejeteeCount > 0" *ngIf="totalCount">{{ totalCount }}</span>
    </button>
    <button type="button" class="tab-nav-btn" [class.active]="selectedTab === 2" (click)="onTabChange(2)">
      Tableau de bord
    </button>
  </div>

  <!-- Contenu des onglets -->
  <div class="tab-content-container" [ngSwitch]="selectedTab">
    <div *ngSwitchCase="0" class="pt-2 md:pt-4">
      <app-facture-form></app-facture-form>
    </div>
    <div *ngSwitchCase="1" class="pt-2 md:pt-4">
      <app-factures-list [monthlyView]="true" [showToolbar]="false"></app-factures-list>
    </div>
    <div *ngSwitchCase="2" class="pt-2 md:pt-4">
      <app-stats></app-stats>
    </div>
  </div>
</div>
